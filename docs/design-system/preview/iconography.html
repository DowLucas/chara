<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_base.css">
<title>Iconography</title>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 14px 18px; align-items: center; }
  .ic { display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--graphite); }
  .ic svg { width: 22px; height: 22px; stroke-width: 1.5; }
  .ic span { font-family: var(--font-mono); font-size: 10px; color: var(--lead); }
  .note { margin-top: 16px; font-family: var(--font-mono); font-size: 11px; color: var(--lead); }
</style>
</head>
<body>
<div class="card-frame">
  <div class="grid">
    <div class="ic"><i data-lucide="users"></i><span>users</span></div>
    <div class="ic"><i data-lucide="receipt"></i><span>receipt</span></div>
    <div class="ic"><i data-lucide="plus"></i><span>plus</span></div>
    <div class="ic"><i data-lucide="arrow-right"></i><span>arrow</span></div>
    <div class="ic"><i data-lucide="check"></i><span>check</span></div>
    <div class="ic"><i data-lucide="x"></i><span>x</span></div>
    <div class="ic"><i data-lucide="settings"></i><span>settings</span></div>
    <div class="ic"><i data-lucide="bell"></i><span>bell</span></div>
    <div class="ic"><i data-lucide="user"></i><span>user</span></div>
    <div class="ic"><i data-lucide="home"></i><span>home</span></div>
    <div class="ic"><i data-lucide="search"></i><span>search</span></div>
    <div class="ic"><i data-lucide="filter"></i><span>filter</span></div>
    <div class="ic"><i data-lucide="calendar"></i><span>calendar</span></div>
    <div class="ic"><i data-lucide="chevron-right"></i><span>chevron</span></div>
    <div class="ic"><i data-lucide="more-horizontal"></i><span>more</span></div>
    <div class="ic"><i data-lucide="trash"></i><span>trash</span></div>
  </div>
  <div class="note">Lucide · outline · 1.5px stroke · graphite</div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
