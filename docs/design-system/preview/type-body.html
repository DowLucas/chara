<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_base.css">
<title>Body type</title>
<style>
  .specimen { display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; gap: 24px; align-items: baseline; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--lead); width: 86px; flex: none; }
  .b-l { font-family: var(--font-body); font-weight: 500; font-size: 17px; letter-spacing: -0.005em; line-height: 1.45; color: var(--graphite); }
  .b   { font-family: var(--font-body); font-weight: 400; font-size: 15px; letter-spacing: -0.005em; line-height: 1.5; color: var(--graphite); }
  .b-s { font-family: var(--font-body); font-weight: 400; font-size: 13px; letter-spacing: 0; line-height: 1.45; color: var(--lead); }
  .cap { font-family: var(--font-body); font-weight: 400; font-size: 12px; letter-spacing: 0; color: var(--lead); }
</style>
</head>
<body>
<div class="card-frame">
  <div class="specimen">
    <div class="row"><span class="tag">body/l · 17/500</span><span class="b-l">Nothing to settle yet.</span></div>
    <div class="row"><span class="tag">body · 15/400</span><span class="b">Split a dinner, a rent, a road trip. We'll do the math.</span></div>
    <div class="row"><span class="tag">body/s · 13/400</span><span class="b-s">Last activity: Lilla Ego, Friday 9:14pm</span></div>
    <div class="row"><span class="tag">caption · 12</span><span class="cap">Settled · 14 May</span></div>
  </div>
</div>
</body>
</html>
