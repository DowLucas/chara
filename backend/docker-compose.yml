services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: quits-backend:dev
    container_name: quits-backend
    network_mode: host
    env_file: .env.local
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/api/health/liveness"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
