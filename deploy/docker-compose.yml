services:
  quits-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: quits
      POSTGRES_USER: quits
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quits"]
      interval: 5s
      timeout: 5s
      retries: 10

  quits-minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"  # MinIO console (dev convenience)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  quits-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    depends_on:
      quits-postgres:
        condition: service_healthy
      quits-minio:
        condition: service_healthy
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      DATABASE_URL: postgres://quits:${POSTGRES_PASSWORD}@quits-postgres:5432/quits?sslmode=disable
      INSTANCE_MODE: selfhost
      JWT_SECRET: ${JWT_SECRET}
      BASE_URL: ${BASE_URL:-http://localhost:8080}
      S3_ENDPOINT: http://quits-minio:9000
      S3_BUCKET: quits
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@quits.app}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health/liveness"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  minio_data:
